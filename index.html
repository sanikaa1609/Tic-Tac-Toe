<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  body {
    display:flex; justify-content:center; align-items:center;
    flex-direction:column; height:100vh; background:#222; color:#fff; font-family:sans-serif;
  }
  h1 { margin-bottom: 10px; }
  #modeSelect, #symbolSelect { margin-bottom:20px; }
  #board {
    display:grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap:5px;
  }
  .cell {
    width:100px; height:100px; background:#333; display:flex;
    justify-content:center; align-items:center; font-size:48px; cursor:pointer;
  }
  .cell:hover { background:#555; }
  #message { margin-top:20px; font-size:18px; }
  button { padding:10px 20px; margin-top:10px; cursor:pointer; }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="modeSelect">
  <button onclick="startGame('friend')">Play with Friend</button>
  <button onclick="startGame('ai')">Play vs AI</button>
</div>

<div id="symbolSelect" style="display:none;">
  <p>Choose your symbol:</p>
  <button onclick="chooseSymbol('X')">X</button>
  <button onclick="chooseSymbol('O')">O</button>
</div>

<div id="board"></div>
<div id="message"></div>
<button id="resetBtn" onclick="resetGame()" style="display:none;">Restart Game</button>

<script src="tic.js"></script>
</body>
</html>
